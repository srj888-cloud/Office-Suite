<!DOCTYPE html>
<html lang="ml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light-bg: #f8f9fa;
            --border: #dee2e6;
            --text-muted: #6c757d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .panel {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .panel-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .form-panel {
            height: fit-content;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            resize: vertical;
            overflow: hidden;
        }

        .form-panel .panel-body {
            padding: 30px;
            overflow-y: auto;
            flex: 1;
        }

        .preview-panel {
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            resize: vertical;
            overflow: hidden;
        }

        .preview-panel .panel-body {
            padding: 0;
            overflow-y: auto;
            flex: 1;
        }

        .resize-handle {
            width: 100%;
            height: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: ns-resize;
            border-radius: 5px;
            margin: 5px 0;
            position: relative;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .resize-handle:hover {
            opacity: 1;
        }

        .resize-handle::after {
            content: "⋯";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary);
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            outline: none;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary), #2980b9);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #229954);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #c0392b);
            color: white;
        }

        .btn-import {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        .btn-export {
            background: linear-gradient(135deg, #6c757d, #495057);
            color: white;
        }

        /* ── Mail Merge ── */
        .merge-section {
            background: #f0f7ff;
            border: 1px solid #b8d4f0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 14px;
        }
        .merge-section > .merge-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a5276;
            margin-bottom: 8px;
            display: block;
        }
        .merge-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .merge-indicator {
            font-size: 0.82rem;
            color: #555;
            flex: 1;
            text-align: center;
            min-width: 80px;
        }
        .merge-table-wrap {
            overflow: auto;
            max-height: 200px;
            border: 1px solid #c8d8ea;
            border-radius: 4px;
            font-size: 0.77rem;
        }
        .merge-table-wrap table {
            border-collapse: collapse;
            min-width: 100%;
        }
        .merge-table-wrap td {
            border: 1px solid #d0d0d0;
            padding: 3px 8px;
            max-width: 200px;
            white-space: pre-wrap;
            word-break: break-word;
            vertical-align: top;
        }
        .merge-placeholder-row td {
            background: #dbeeff;
            color: #1a6fa8;
            font-style: italic;
            cursor: pointer;
            user-select: all;
        }
        .merge-header-row td {
            background: #e8edf2;
            font-weight: bold;
        }
        .merge-data-row { cursor: pointer; }
        .merge-data-row:hover td { background: #eaf4fb !important; }
        .merge-data-row.active td { background: #d5f5e3 !important; }

        .dynamic-section {
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            background: var(--light-bg);
        }

        .dynamic-item {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: flex-start;
        }

        .dynamic-item-content {
            flex: 1;
        }

        .letter-preview {
            flex: 1;
            overflow: auto;
            background: #f5f5f5;
            padding: 10px;
            font-family: 'Mandaram', 'Noto Sans Malayalam', serif;
            font-size: 11pt;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background: #e8e8e8;
            border-bottom: 1px solid #ccc;
            font-size: 12px;
            flex-shrink: 0;
        }
        .zoom-btn {
            width: 26px;
            height: 26px;
            border: 1px solid #bbb;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
        }
        .zoom-btn:hover { background: #f0f4ff; border-color: var(--primary); }
        .zoom-level {
            min-width: 40px;
            text-align: center;
            font-weight: 600;
            color: #444;
        }
        .preview-panel:fullscreen,
        .preview-panel:-webkit-full-screen {
            max-height: 100vh !important;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
            border-radius: 0;
        }
        .preview-panel:fullscreen .letter-preview,
        .preview-panel:-webkit-full-screen .letter-preview { flex: 1; }
        .form-panel:fullscreen,
        .form-panel:-webkit-full-screen {
            max-height: 100vh !important;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 0;
        }
        .form-panel:fullscreen .panel-body,
        .form-panel:-webkit-full-screen .panel-body { flex: 1; overflow-y: auto; }

        .page-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto 20px;
            padding: 20mm;
            background: white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 15px;
            width: 90%;
            max-width: 700px;
            overflow: hidden;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 25px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .close {
            color: white;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            z-index: 2000;
        }

        .toast.show {
            display: block;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
            font-family: inherit;
        }

        table td,
        table th {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
        }

        table th {
            background-color: #f0f0f0;
            font-weight: bold;
        }

        .lang-switch {
            display: flex;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--secondary);
            margin-bottom: 20px;
        }

        .lang-btn {
            flex: 1;
            padding: 8px 16px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            background: white;
            color: var(--primary);
            transition: all 0.2s;
        }

        .lang-btn.lang-active {
            background: linear-gradient(135deg, var(--secondary), #2980b9);
            color: white;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .form-panel {
                display: none;
            }

            .container {
                grid-template-columns: 1fr;
            }

            .panel-header {
                display: none;
            }

            .panel-body {
                padding: 0;
            }

            .letter-preview {
                background: white;
                padding: 0;
            }

            .page-container {
                box-shadow: none;
                margin: 0;
            }

            @page {
                size: A4;
                margin: 20mm;
            }
        }
    </style>
    <script src="assets/js/xlsx.full.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="panel form-panel" id="formPanel">
            <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between;">
                <span>Letter Details</span>
                <button id="formFsBtn" onclick="toggleFormFullscreen()" title="Fullscreen" style="background:none;border:none;color:white;cursor:pointer;font-size:15px;padding:2px 6px;opacity:0.85;line-height:1;">⛶</button>
            </div>
            <div class="panel-body">
                <div class="lang-switch">
                    <button id="btnMl" class="lang-btn lang-active" onclick="setLanguage('ml')">മലയാളം</button>
                    <button id="btnEn" class="lang-btn" onclick="setLanguage('en')">English</button>
                </div>

                <div class="form-group">
                    <label>Template:</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <select id="templateSelect" onchange="loadTemplate()" style="flex: 1; min-width: 0;">
                            <option value="custom">Custom Template</option>
                        </select>
                        <input type="file" id="templateUpload" accept=".json" style="display: none;">
                        <button type="button" class="btn btn-import btn-small"
                            onclick="document.getElementById('templateUpload').click()">📂 Import</button>
                    </div>
                </div>

                <!-- ── Mail Merge ── -->
                <div class="merge-section">
                    <span class="merge-label">📊 Mail Merge</span>
                    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                        <input type="file" id="mergeUpload" accept=".csv,.xlsx,.xls" style="display:none;" onchange="handleMergeUpload(event)">
                        <button type="button" class="btn btn-import btn-small" onclick="document.getElementById('mergeUpload').click()">⬆ Upload CSV / Excel</button>
                        <button type="button" id="mergeClearBtn" class="btn btn-danger btn-small" onclick="clearMergeData()" style="display:none;">✕ Clear</button>
                    </div>
                    <div id="mergePanel" style="display:none;margin-top:10px;">
                        <div class="merge-nav">
                            <button type="button" class="btn btn-small" onclick="prevMergeRow()" style="padding:4px 10px;">◀ Prev</button>
                            <span class="merge-indicator" id="mergeRowIndicator">Showing template</span>
                            <button type="button" class="btn btn-small" onclick="nextMergeRow()" style="padding:4px 10px;">Next ▶</button>
                            <button type="button" class="btn btn-small" onclick="applyMergeRow(-1)" style="padding:4px 10px;background:#eee;color:#333;">⊘ Template</button>
                        </div>
                        <div class="merge-table-wrap" id="mergeTableContainer"></div>
                        <div style="font-size:0.72rem;color:#888;margin-top:4px;">💡 Click a row to apply. Blue row shows placeholders — copy and paste into fields above.</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>File No.:</label>
                    <input type="text" id="refNumber" value="" oninput="updatePreview()">
                </div>

                <input type="hidden" id="fromAddress">

                <div class="dynamic-section">
                    <label>To Address:</label>
                    <button type="button" class="btn btn-primary" onclick="openManager('address')">Manage
                        Addresses</button>
                    <div id="toAddresses">
                        <div class="dynamic-item">
                            <div class="dynamic-item-content">
                                <select class="address-dropdown" onchange="loadAddress(this, 'to')">
                                    <option value="">Select saved address...</option>
                                </select>
                                <textarea class="address-textarea" oninput="updatePreview()"></textarea>
                            </div>
                            <button type="button" class="btn btn-danger"
                                onclick="removeField(this, 'toAddresses')">×</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-success" onclick="addField('toAddresses', 'to')">Add
                        Address</button>
                </div>

                <div class="form-group">
                    <label>Subject:</label>
                    <textarea id="subject" rows="1"
                        style="resize: none; overflow: hidden; min-height: 36px;"
                        oninput="autoExpand(this); updatePreview()"
                        placeholder="Enter subject"></textarea>
                </div>

                <div class="dynamic-section">
                    <label>References:</label>
                    <div id="references">
                        <div class="dynamic-item">
                            <textarea class="reference-input" rows="1"
                                style="resize:none;overflow:hidden;min-height:36px;"
                                oninput="autoExpand(this);updatePreview()"
                                placeholder="Enter reference"></textarea>
                            <button type="button" class="btn btn-danger"
                                onclick="removeField(this, 'references')">×</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-success" onclick="addField('references', 'ref')">Add
                        Reference</button>
                </div>

                <div class="form-group">
                    <label>Letter Body:</label>
                    <input type="file" id="excelUpload" accept=".xlsx,.xls" style="display: none;" multiple>
                    <button type="button" class="btn" onclick="document.getElementById('excelUpload').click()"
                        style="background: linear-gradient(135deg, #66bb6a, #4caf50); color: white; margin: 5px;">Upload
                        Excel</button>
                    <textarea id="letterBody" style="min-height: 150px;" oninput="updatePreview()"></textarea>
                    <div id="uploadedTables"></div>
                </div>

                <div class="dynamic-section">
                    <label>Enclosures (ഉള്ളടക്കം):</label>
                    <div id="enclosures">
                        <div class="dynamic-item">
                            <div class="dynamic-item-content">
                                <input type="text" class="enclosure-input" oninput="updatePreview()" placeholder="Enter enclosure...">
                            </div>
                            <button type="button" class="btn btn-danger" onclick="removeField(this, 'enclosures')">×</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-success" onclick="addField('enclosures', 'enclosure')">Add Enclosure</button>
                </div>

                <div class="dynamic-section">
                    <label>Copy To:</label>
                    <button type="button" class="btn btn-primary" onclick="openManager('copy')">Manage Copy
                        Addresses</button>
                    <div id="copyTo">
                        <div class="dynamic-item">
                            <div class="dynamic-item-content">
                                <select class="copy-dropdown" onchange="loadAddress(this, 'copy')">
                                    <option value="">Select saved copy address...</option>
                                </select>
                                <input type="text" class="copy-input" oninput="updatePreview()">
                            </div>
                            <button type="button" class="btn btn-danger"
                                onclick="removeField(this, 'copyTo')">×</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-success" onclick="addField('copyTo', 'copy')">Add Copy</button>
                </div>

                <input type="hidden" id="principalName" value="">

                <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                    <button type="button" class="btn btn-export" onclick="doExport()"
                        style="width: 100%; font-size: 15px; padding: 14px; display: flex; justify-content: center; align-items: center;">
                        💾 Export
                    </button>
                    <button type="button" class="btn btn-primary" onclick="copyZeroMargin()"
                        style="width: 100%; font-size: 16px; padding: 15px; display: flex; justify-content: center; align-items: center;">
                        📋 Copy Letter
                    </button>
                </div>
            </div>
            <div class="resize-handle" onmousedown="startResize(event, 'formPanel')"></div>
        </div>

        <div class="panel preview-panel" id="previewPanel">
            <div class="panel-header">Letter Preview</div>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="zoomOut()">−</button>
                <span class="zoom-level" id="zoomLevel">75%</span>
                <button class="zoom-btn" onclick="zoomIn()">+</button>
                <button class="zoom-btn" onclick="zoomReset()" style="width:auto;padding:0 8px;font-size:11px;">↺</button>
                <button class="zoom-btn" id="fsBtn" onclick="toggleFullscreen()" title="Fullscreen" style="width:auto;padding:0 8px;font-size:13px;">⛶</button>
                <button class="zoom-btn" onclick="printPreview()" title="Print" style="width:auto;padding:0 8px;font-size:13px;">🖨</button>
                <button class="zoom-btn" id="allDraftsBtn" onclick="generateAllDrafts()" title="Generate all merge drafts" style="display:none;width:auto;padding:0 8px;font-size:11px;background:#e8f4e8;border-color:#5a9e5a;color:#2d6a2d;">📄 All Drafts</button>
            </div>
            <div class="letter-preview">
                <div id="letterPreview"></div>
            </div>
            <div class="resize-handle" onmousedown="startResize(event, 'previewPanel')"></div>
        </div>
    </div>

    <div id="toast" class="toast"><span id="toastMessage"></span></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Modal</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // Global variables
        var data = {
            addresses: [],
            copyAddresses: [],
            templates: [],
            tables: {},
            tableCounter: 0
        };
        var currentManager = '';
        var isResizing = false;
        var currentPanel = null;
        var startY = 0;
        var startHeight = 0;

        function todayFormatted() {
            var d = new Date();
            return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear();
        }

        // Language toggle
        var currentLang = 'ml'; // Malayalam is the default

        var labels = {
            ml: {
                font: "mandaram, 'Noto Sans Malayalam', 'Malayalam Sangam MN', serif",
                number: 'നം',
                date: 'തീയതി',
                from: 'പ്രേഷകൻ',
                to: 'സ്വീകർത്താവ്',
                sirMadam: 'സർ/മാഡം,',
                subject: 'വിഷയം',
                reference: 'സൂചന',
                faithfully: 'വിശ്വസ്തതയോടെ,',
                copy: 'പകർപ്പ്',
                enclosure: 'ഉള്ളടക്കം',
                principal: 'പ്രിന്‍സിപ്പാള്‍(i/c)'
            },
            en: {
                font: "'Times New Roman', Times, serif",
                number: 'No.',
                date: 'Date',
                from: 'From',
                to: 'To',
                sirMadam: 'Sir/Madam,',
                subject: 'Sub',
                reference: 'Ref',
                faithfully: 'Yours faithfully,',
                copy: 'Copy to',
                enclosure: 'Enclosure',
                principal: 'Principal(i/c)'
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('btnMl').classList.toggle('lang-active', lang === 'ml');
            document.getElementById('btnEn').classList.toggle('lang-active', lang === 'en');
            document.querySelector('.letter-preview').style.fontFamily = labels[lang].font;
            loadOfficeProfile();
            updatePreview();
        }

        var previewZoom = 0.75;
        function applyZoom() {
            document.querySelectorAll('.page-container').forEach(function(el) { el.style.zoom = previewZoom; });
            var el = document.getElementById('zoomLevel');
            if (el) el.textContent = Math.round(previewZoom * 100) + '%';
        }
        function zoomIn()    { if (previewZoom < 2.0) { previewZoom = Math.round((previewZoom + 0.1) * 10) / 10; applyZoom(); } }
        function zoomOut()   { if (previewZoom > 0.3) { previewZoom = Math.round((previewZoom - 0.1) * 10) / 10; applyZoom(); } }
        function zoomReset() { previewZoom = 0.75; applyZoom(); }
        function toggleFullscreen() {
            var panel = document.getElementById('previewPanel');
            if (!document.fullscreenElement) {
                panel.requestFullscreen && panel.requestFullscreen();
            } else {
                document.exitFullscreen && document.exitFullscreen();
            }
        }
        function toggleFormFullscreen() {
            var panel = document.getElementById('formPanel');
            if (!document.fullscreenElement) {
                panel.requestFullscreen && panel.requestFullscreen();
            } else {
                document.exitFullscreen && document.exitFullscreen();
            }
        }
        document.addEventListener('fullscreenchange', function() {
            var isFs = !!document.fullscreenElement;
            var btn = document.getElementById('fsBtn');
            var formBtn = document.getElementById('formFsBtn');
            if (btn) btn.textContent = isFs ? '✕' : '⛶';
            if (formBtn) formBtn.textContent = isFs ? '✕' : '⛶';
        });

        function generateAllDrafts() {
            if (!mergeState.rows.length) return;
            var preview = document.getElementById('letterPreview');
            var savedIndex = mergeState.currentIndex;
            var parts = [];
            for (var i = 0; i < mergeState.rows.length; i++) {
                mergeState.currentIndex = i;
                updatePreview();
                var separator = i > 0
                    ? '<div class="draft-separator" style="page-break-before:always;margin:30px 0 20px;border-top:2px dashed #bbb;text-align:center;padding-top:10px;color:#999;font-size:11px;">— Draft ' + (i + 1) + ' of ' + mergeState.rows.length + ' —</div>'
                    : '';
                parts.push(separator + preview.innerHTML);
            }
            mergeState.currentIndex = savedIndex;
            updateMergeIndicator();

            var maxHeight = window.innerHeight - 100;

        function parseMergeCSV(text) {
            // Full character-by-character parser that preserves newlines inside quoted fields
            var raw = [], row = [], field = '', inQuote = false;
            for (var i = 0; i < text.length; i++) {
                var c = text[i], next = i + 1 < text.length ? text[i + 1] : '';
                if (inQuote) {
                    if (c === '"' && next === '"') { field += '"'; i++; }       // escaped quote
                    else if (c === '"') { inQuote = false; }                    // closing quote
                    else { field += c; }                                        // preserve \n inside quotes
                } else {
                    if (c === '"') { inQuote = true; }
                    else if (c === ',') { row.push(field); field = ''; }
                    else if (c === '\r' && next === '\n') {                     // CRLF
                        row.push(field); if (row.some(function(v){return v.trim();})) raw.push(row);
                        row = []; field = ''; i++;
                    } else if (c === '\n' || c === '\r') {                      // LF or CR
                        row.push(field); if (row.some(function(v){return v.trim();})) raw.push(row);
                        row = []; field = '';
                    } else { field += c; }
                }
            }
            // flush last field/row
            row.push(field);
            if (row.some(function(v){return v.trim();})) raw.push(row);
            if (raw.length < 2) { showToast('Table needs at least a header row and one data row.'); return; }
            processMergeData(raw);
        }

        function processMergeData(raw) {
            var headers = raw[0].map(function(h) { return String(h).trim(); }).filter(Boolean);
            var rows = [];
            for (var i = 1; i < raw.length; i++) {
                var anyVal = false;
                for (var j = 0; j < headers.length; j++) { if (String(raw[i][j] || '').trim()) { anyVal = true; break; } }
                if (!anyVal) continue;
                var rowObj = {};
                headers.forEach(function(h, idx) {
                    var _v = String(raw[i][idx] !== undefined ? raw[i][idx] : '').replace(/\\n/g, '\n');
                    if (_v.charAt(0) === '"' && _v.charAt(_v.length - 1) === '"' && _v.length >= 2) _v = _v.slice(1, -1);
                    rowObj[h] = _v;
                });
                rows.push(rowObj);
            }
            if (!rows.length) { showToast('No data rows found.'); return; }
            mergeState.headers = headers;
            mergeState.rows = rows;
            mergeState.currentIndex = -1;
            showMergePanel();
            showToast('Loaded ' + rows.length + ' row(s) with columns: ' + headers.join(', '));
        }

        function processRawExcelHTML(rawHTML) {
            // Create a temporary div to work with the HTML
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = rawHTML;

            var table = tempDiv.querySelector('table');
            if (!table) return rawHTML;

            // Process all cells and extract clean text content
            var rows = table.querySelectorAll('tr');
            var cleanedHTML = '<table border="1" cellpadding="8" cellspacing="0" style="width: 100%; border-collapse: collapse; margin: 20px 0; font-family: inherit; font-size: 11pt; border: 1px solid #333;">';

            for (var i = 0; i < rows.length; i++) {
                var row = rows[i];
                var cells = row.querySelectorAll('td, th');

                if (cells.length === 0) continue;

                cleanedHTML += '<tr>';

                for (var j = 0; j < cells.length; j++) {
                    var cell = cells[j];

                    // Extract only the text content, ignore all HTML/style artifacts
                    var cleanText = cell.textContent || cell.innerText || '';

                    // Remove any residual style text that leaked into content
                    cleanText = cleanText.replace(/style="[^"]*"/g, '');
                    cleanText = cleanText.replace(/border:\s*[^;]*;/g, '');
                    cleanText = cleanText.replace(/padding:\s*[^;]*;/g, '');
                    cleanText = cleanText.replace(/background-color:\s*[^;]*;/g, '');
                    cleanText = cleanText.replace(/font-weight:\s*[^;]*;/g, '');
                    cleanText = cleanText.replace(/text-align:\s*[^;]*;/g, '');
                    cleanText = cleanText.replace(/white-space:\s*[^;]*;/g, '');
                    cleanText = cleanText.trim();

                    // Use HTML attributes for better copy compatibility
                    var cellStyle = 'border: 1px solid #333; padding: 8px; text-align: left; white-space: pre-wrap;';
                    var cellAttrs = ' border="1" style="' + cellStyle;

                    // Only visual difference for first row
                    if (i === 0) {
                        cellAttrs += ' background-color: #f0f0f0; font-weight: bold;';
                    }

                    cellAttrs += '"';

                    cleanedHTML += '<td' + cellAttrs + '>' + cleanText + '</td>';
                }

                cleanedHTML += '</tr>';
            }

            cleanedHTML += '</table>';
            return cleanedHTML;
        }

        function createUniformTable(tableData) {
            if (!tableData || tableData.length === 0) return '';

            var html = '<table style="width: 100%; border-collapse: collapse; margin: 20px 0; font-family: inherit; font-size: 11pt;">';

            for (var rowIndex = 0; rowIndex < tableData.length; rowIndex++) {
                var row = tableData[rowIndex];
                if (!row || row.every(function (cell) { return !cell; })) continue;

                html += '<tr>';
                for (var cellIndex = 0; cellIndex < row.length; cellIndex++) {
                    var cellValue = row[cellIndex] || '';

                    // All cells use exactly the same processing - no special header treatment
                    var style = 'border: 1px solid #333; padding: 8px; text-align: left; white-space: pre-wrap;';

                    // Only visual styling difference for first row (bold + background)
                    if (rowIndex === 0) {
                        style += ' background-color: #f0f0f0; font-weight: bold;';
                    }

                    html += '<td style="' + style + '">' + cellValue + '</td>';
                }
                html += '</tr>';
            }

            html += '</table>';
            return html;
        }

        function createCleanTable(jsonData, workbook, sheetName) {
            if (!jsonData || jsonData.length === 0) return '';

            // Get the worksheet for additional formatting info
            var worksheet = workbook.Sheets[sheetName];

            var html = '<table style="width: 100%; border-collapse: collapse; margin: 20px 0; font-family: inherit; font-size: 11pt;">';

            for (var rowIndex = 0; rowIndex < jsonData.length; rowIndex++) {
                var row = jsonData[rowIndex];
                if (!row || row.every(function (cell) { return !cell; })) continue;

                html += '<tr>';
                for (var cellIndex = 0; cellIndex < row.length; cellIndex++) {
                    var cellValue = (row[cellIndex] || '').toString();

                    // Get cell reference (A1, B1, etc.)
                    var cellRef = XLSX.utils.encode_cell({ r: rowIndex, c: cellIndex });
                    var cellObj = worksheet[cellRef];

                    // Always use the exact cell value as displayed in Excel
                    if (cellObj && cellObj.w) {
                        cellValue = cellObj.w; // Use formatted display value
                    } else if (cellObj && cellObj.v !== undefined) {
                        cellValue = cellObj.v.toString(); // Use raw value
                    }

                    // Apply same styling to all rows - no special header treatment
                    var tag = 'td';
                    var style = 'border: 1px solid #333; padding: 8px; text-align: left; white-space: pre-wrap;';

                    // Only make first row bold for visual distinction, but same content processing
                    if (rowIndex === 0) {
                        style += ' background-color: #f0f0f0; font-weight: bold;';
                    }

                    // Check for merged cells
                    if (worksheet['!merges']) {
                        for (var i = 0; i < worksheet['!merges'].length; i++) {
                            var merge = worksheet['!merges'][i];
                            if (rowIndex >= merge.s.r && rowIndex <= merge.e.r &&
                                cellIndex >= merge.s.c && cellIndex <= merge.e.c) {
                                if (rowIndex === merge.s.r && cellIndex === merge.s.c) {
                                    // This is the top-left cell of merged range
                                    var colspan = merge.e.c - merge.s.c + 1;
                                    var rowspan = merge.e.r - merge.s.r + 1;
                                    if (colspan > 1) style += '" colspan="' + colspan;
                                    if (rowspan > 1) style += '" rowspan="' + rowspan;
                                } else {
                                    // Skip cells that are part of merged range but not top-left
                                    continue;
                                }
                            }
                        }
                    }

                    html += '<' + tag + ' style="' + style + '">' + cellValue + '</' + tag + '>';
                }
                html += '</tr>';
            }

            html += '</table>';
            return html;
        }

                if (enclosureInputs[i].value.trim()) enclosures.push(enclosureInputs[i].value.trim());
            }

            var _p3 = getOfficeProfile();
            var _n3 = (_p3 && (currentLang === 'en' ? (_p3.officeNameEn || _p3.officeName) : _p3.officeName)) || '[ Office Name ]';
            var _a3 = (_p3 && (currentLang === 'en' ? (_p3.officeAddressEn || _p3.officeAddress) : _p3.officeAddress)) || '[ Office Address ]';
            return _n3 + '\n' + _a3 + '\n' +

                L.from + '\n  ' + fromAddress + '\n\n' +

                (subject ? '  ' + L.subject + ': ' + subject + '\n' : '') +

                '\n' + (letterBody ? letterBody.split('\n').filter(function (p) { return p.trim(); }).map(function (p) { return '  ' + p; }).join('\n') : '') + '\n\n' +
                '                                                        ' + L.faithfully + '\n\n' +
                '                                                        ' + principalName + '\n' +
                '                                                        ' + L.principal + '\n\n' +
                (enclosures.length > 0 ? L.enclosure + ':\n' + enclosures.map(function (enc, index) { return '  ' + (enclosures.length > 1 ? (index + 1) + '. ' : '') + enc; }).join('\n') + '\n' : '') +
                (copyTo.length > 0 ? L.copy + ':\n' + copyTo.map(function (copy, index) { return '  ' + (copyTo.length > 1 ? (index + 1) + '. ' : '') + copy; }).join('\n') : '');
        }

        function fallbackCopy(content) {
            var tempDiv = document.createElement('div');
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            tempDiv.innerHTML = content;
            document.body.appendChild(tempDiv);

            var selection = window.getSelection();
            var range = document.createRange();
            range.selectNodeContents(tempDiv);
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                showToast('Content copied! Paste into your document.');
            } catch (err) {
                showToast('Copy failed. Please select and copy manually from the preview.');
            }

            selection.removeAllRanges();
            document.body.removeChild(tempDiv);
        }

        function showModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function showToast(message) {
            document.getElementById('toastMessage').textContent = message;
            document.getElementById('toast').classList.add('show');
            setTimeout(function () {
                document.getElementById('toast').classList.remove('show');
            }, 3000);
        }

        window.onclick = function (event) {
            var modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
