<!DOCTYPE html>
<html lang="ml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular/Notice</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --light-bg: #f8f9fa;
            --border: #dee2e6;
            --text-muted: #6c757d;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .panel {
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-2px);
        }

        .panel-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px;
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-header::before {
            content: '📝';
            font-size: 1.5rem;
        }

        .preview-panel .panel-header::before {
            content: '👁️';
        }

        .preview-panel {
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            resize: vertical;
            overflow: hidden;
        }

        .form-panel {
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .form-panel .panel-body {
            padding: 30px;
            overflow-y: auto;
            flex: 1;
        }

        .preview-panel {
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .preview-panel .panel-body {
            padding: 0;
            overflow-y: auto;
            flex: 1;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary);
            font-size: 1rem;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
            outline: none;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            margin: 5px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary), #2980b9);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #229954);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #c0392b);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #e67e22);
            color: white;
        }

        .btn-import {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        .btn-export {
            background: linear-gradient(135deg, #6c757d, #495057);
            color: white;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        .dynamic-section {
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            background: var(--light-bg);
            position: relative;
        }

        .dynamic-section::before {
            content: attr(data-label);
            position: absolute;
            top: -12px;
            left: 20px;
            background: white;
            padding: 0 10px;
            color: var(--primary);
            font-weight: 600;
            font-size: 14px;
        }

        .dynamic-item {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: flex-start;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .dynamic-item-content {
            flex: 1;
        }

        .letter-preview {
            background: #f8f9fa;
            padding: 10px;
            font-family: 'Noto Sans Malayalam', 'Mandaram', serif;
            font-size: 11pt;
            line-height: 1.6;
            overflow: auto;
            flex: 1;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background: #e8e8e8;
            border-bottom: 1px solid #ccc;
            font-size: 12px;
            flex-shrink: 0;
        }
        .zoom-btn {
            width: 26px;
            height: 26px;
            border: 1px solid #bbb;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
        }
        .zoom-btn:hover { background: #f0f4ff; border-color: var(--primary); }
        .zoom-level {
            min-width: 40px;
            text-align: center;
            font-weight: 600;
            color: #444;
        }
        .preview-panel:fullscreen,
        .preview-panel:-webkit-full-screen {
            max-height: 100vh !important;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f8f9fa;
            border-radius: 0;
        }
        .preview-panel:fullscreen .letter-preview,
        .preview-panel:-webkit-full-screen .letter-preview { flex: 1; }
        .form-panel:fullscreen,
        .form-panel:-webkit-full-screen {
            max-height: 100vh !important;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 0;
        }
        .form-panel:fullscreen .panel-body,
        .form-panel:-webkit-full-screen .panel-body { flex: 1; overflow-y: auto; }

        .page-container {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto 20px;
            padding: 20mm;
            background: white;
            box-shadow: var(--shadow);
            border-radius: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 3% auto;
            padding: 0;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            overflow: hidden;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.3rem;
        }

        .modal-body {
            padding: 30px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .close {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .close:hover {
            opacity: 0.7;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--success);
            color: white;
            padding: 20px 30px;
            border-radius: 15px;
            display: none;
            z-index: 2000;
            box-shadow: var(--shadow);
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .toast.show {
            display: block;
        }

        .toast.error {
            background: var(--danger);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
            font-family: inherit;
            border-radius: 8px;
            overflow: hidden;
        }

        table td,
        table th {
            border: 1px solid #333;
            padding: 12px;
            text-align: left;
            vertical-align: top;
        }

        table th {
            background-color: #f0f0f0;
            font-weight: bold;
        }

        .file-upload-zone {
            border: 2px dashed var(--border);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin: 10px 0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .file-upload-zone:hover {
            border-color: var(--secondary);
            background: var(--light-bg);
        }

        .file-upload-zone.dragover {
            border-color: var(--success);
            background: rgba(39, 174, 96, 0.1);
        }

        .uploaded-files {
            margin-top: 15px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--secondary);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .lang-switch {
            display: flex;
            gap: 0;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--secondary);
            margin-bottom: 20px;
        }

        .lang-btn {
            flex: 1;
            padding: 8px 16px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            background: white;
            color: var(--primary);
            transition: all 0.2s;
        }

        .lang-btn.lang-active {
            background: linear-gradient(135deg, var(--secondary), #2980b9);
            color: white;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .resize-handle {
            width: 100%;
            height: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: ns-resize;
            border-radius: 5px;
            margin: 5px 0;
            position: relative;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .resize-handle:hover {
            opacity: 1;
        }

        .resize-handle::after {
            content: "⋯";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .panel-body {
                padding: 20px;
            }

            .btn {
                padding: 10px 16px;
                font-size: 13px;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .form-panel {
                display: none;
            }

            .container {
                grid-template-columns: 1fr;
            }

            .panel-header {
                display: none;
            }

            .panel-body {
                padding: 0;
            }

            .letter-preview {
                background: white;
                padding: 0;
            }

            .page-container {
                box-shadow: none;
                margin: 0;
            }

            @page {
                size: A4;
                margin: 20mm;
            }
        }

        /* ── Mail Merge ── */
        .merge-section {
            background: #f0f7ff;
            border: 1px solid #b8d4f0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 14px;
        }
        .merge-section > .merge-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1a5276;
            margin-bottom: 8px;
            display: block;
        }
        .merge-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .merge-indicator {
            font-size: 0.82rem;
            color: #555;
            flex: 1;
            text-align: center;
            min-width: 80px;
        }
        .merge-table-wrap {
            overflow: auto;
            max-height: 200px;
            border: 1px solid #c8d8ea;
            border-radius: 4px;
            font-size: 0.77rem;
        }
        .merge-table-wrap table {
            border-collapse: collapse;
            min-width: 100%;
        }
        .merge-table-wrap td {
            border: 1px solid #d0d0d0;
            padding: 3px 8px;
            max-width: 200px;
            white-space: pre-wrap;
            word-break: break-word;
            vertical-align: top;
        }
        .merge-placeholder-row td {
            background: #dbeeff;
            color: #1a6fa8;
            font-style: italic;
            cursor: pointer;
            user-select: all;
        }
        .merge-header-row td {
            background: #e8edf2;
            font-weight: bold;
        }
        .merge-data-row { cursor: pointer; }
        .merge-data-row:hover td { background: #eaf4fb !important; }
        .merge-data-row.active td { background: #d5f5e3 !important; }
    </style>
    <script src="assets/js/xlsx.full.min.js"></script>
</head>

<body>
    <div class="container">
        <div class="panel form-panel" id="formPanel">
            <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between;">
                <span>Notice/Circular Details</span>
                <button id="formFsBtn" onclick="toggleFormFullscreen()" title="Fullscreen" style="background:none;border:none;color:white;cursor:pointer;font-size:15px;padding:2px 6px;opacity:0.85;line-height:1;">⛶</button>
            </div>
            <div class="panel-body">
                <div class="lang-switch">
                    <button id="btnMl" class="lang-btn lang-active" onclick="setLanguage('ml')">മലയാളം</button>
                    <button id="btnEn" class="lang-btn" onclick="setLanguage('en')">English</button>
                </div>

                <!-- Template Management -->
                <div class="form-group">
                    <label>Template Management:</label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <select id="templateSelect" onchange="loadTemplate()" style="flex: 1; min-width: 0;">
                            <option value="custom">Custom Template</option>
                        </select>
                        <input type="file" id="templateUpload" accept=".json" style="display: none;">
                        <button type="button" class="btn btn-import btn-small"
                            onclick="document.getElementById('templateUpload').click()">
                            📂 Import
                        </button>
                    </div>
                </div>

                <!-- ── Mail Merge ── -->
                <div class="merge-section">
                    <span class="merge-label">📊 Mail Merge</span>
                    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                        <input type="file" id="mergeUpload" accept=".csv,.xlsx,.xls" style="display:none;" onchange="handleMergeUpload(event)">
                        <button type="button" class="btn btn-import btn-small" onclick="document.getElementById('mergeUpload').click()">⬆ Upload CSV / Excel</button>
                        <button type="button" id="mergeClearBtn" class="btn btn-danger btn-small" onclick="clearMergeData()" style="display:none;">✕ Clear</button>
                    </div>
                    <div id="mergePanel" style="display:none;margin-top:10px;">
                        <div class="merge-nav">
                            <button type="button" class="btn btn-small" onclick="prevMergeRow()" style="padding:4px 10px;">◀ Prev</button>
                            <span class="merge-indicator" id="mergeRowIndicator">Showing template</span>
                            <button type="button" class="btn btn-small" onclick="nextMergeRow()" style="padding:4px 10px;">Next ▶</button>
                            <button type="button" class="btn btn-small" onclick="applyMergeRow(-1)" style="padding:4px 10px;background:#eee;color:#333;">⊘ Template</button>
                        </div>
                        <div class="merge-table-wrap" id="mergeTableContainer"></div>
                        <div style="font-size:0.72rem;color:#888;margin-top:4px;">💡 Click a row to apply. Blue row shows placeholders — copy and paste into fields above.</div>
                    </div>
                </div>

                <!-- Basic Information -->
                <div class="form-group">
                    <label>File No.:</label>
                    <input type="text" id="refNumber" value="" oninput="updatePreview()"
                        placeholder="Enter reference number">
                </div>

                <!-- Notice/Circular Title -->
                <div class="form-group">
                    <label>Title (Notice/Circular/Note):</label>
                    <input type="text" id="noticeTitle" oninput="updatePreview()" style="text-decoration: underline;"
                        placeholder="Enter title (e.g., Notice, Circular, Important Note)">
                </div>

                <!-- Subject -->
                <div class="form-group">
                    <label>Subject (Optional):</label>
                    <textarea id="subject" rows="1" style="resize: none; overflow: hidden; min-height: 36px;"
                        oninput="autoExpand(this); updatePreview()"
                        placeholder="Enter subject (leave blank if not needed)"></textarea>
                </div>

                <!-- References -->
                <div class="dynamic-section" data-label="References (Optional)">
                    <div id="references">
                        <div class="dynamic-item">
                            <textarea class="reference-input" rows="1"
                                style="resize:none;overflow:hidden;min-height:36px;"
                                oninput="autoExpand(this);updatePreview()"
                                placeholder="Enter reference (leave blank if not needed)"></textarea>
                            <button type="button" class="btn btn-danger btn-small"
                                onclick="removeField(this, 'references')">×</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-success btn-small" onclick="addField('references', 'ref')">+
                        Add Reference</button>
                </div>

                <!-- Notice/Circular Body with File Upload -->
                <div class="form-group">
                    <label>Notice/Circular Body:</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">

                        <input type="file" id="excelUpload" accept=".xlsx,.xls" style="display: none;" multiple>
                        <button type="button" class="btn btn-success btn-small"
                            onclick="document.getElementById('excelUpload').click()">
                            📈 Upload Excel
                        </button>
                    </div>
                    <textarea id="letterBody" style="min-height: 200px;" oninput="updatePreview()"
                        placeholder="Enter notice/circular body content"></textarea>
                    <div id="uploadedTables"></div>
                </div>

                <!-- To -->
                <div class="dynamic-section" data-label="To">
                    <div id="toContainer">
                        <!-- To items will be added here -->
                    </div>
                    <button type="button" class="btn btn-success btn-small" onclick="addTo()">+ Add To</button>
                </div>

                <!-- Copy To -->
                <div class="dynamic-section" data-label="Copy To">
                    <button type="button" class="btn btn-primary btn-small" onclick="openManager('copy')">
                        ⚙️ Manage Copy Addresses
                    </button>
                    <div id="copyTo">
                        <div class="dynamic-item">
                            <div class="dynamic-item-content">
                                <select class="copy-dropdown" onchange="loadAddress(this, 'copy')">
                                    <option value="">Select saved copy address...</option>
                                </select>
                                <input type="text" class="copy-input" oninput="updatePreview()"
                                    placeholder="Enter copy recipient">
                            </div>
                            <button type="button" class="btn btn-danger btn-small"
                                onclick="removeField(this, 'copyTo')">×</button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-success btn-small" onclick="addField('copyTo', 'copy')">+ Add
                        Copy</button>
                </div>

                <input type="hidden" id="principalName" value="">

                <!-- Action Buttons -->
                <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
                    <button type="button" class="btn btn-export" onclick="exportTemplate()"
                        style="width: 100%; font-size: 15px; padding: 14px; display: flex; justify-content: center; align-items: center;">
                        💾 Export
                    </button>
                    <button type="button" class="btn btn-primary" onclick="copyLetter()"
                        style="width: 100%; font-size: 16px; padding: 20px; display: flex; justify-content: center; align-items: center;">
                        📋 Copy Notice/Circular
                    </button>
                </div>
            </div>
        </div>

        <div class="panel preview-panel" id="previewPanel">
            <div class="panel-header">Notice/Circular Preview</div>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="zoomOut()">−</button>
                <span class="zoom-level" id="zoomLevel">75%</span>
                <button class="zoom-btn" onclick="zoomIn()">+</button>
                <button class="zoom-btn" onclick="zoomReset()" style="width:auto;padding:0 8px;font-size:11px;">↺</button>
                <button class="zoom-btn" id="fsBtn" onclick="toggleFullscreen()" title="Fullscreen" style="width:auto;padding:0 8px;font-size:13px;">⛶</button>
                <button class="zoom-btn" onclick="printPreview()" title="Print" style="width:auto;padding:0 8px;font-size:13px;">🖨</button>
                <button class="zoom-btn" id="allDraftsBtn" onclick="generateAllDrafts()" title="Generate all merge drafts" style="display:none;width:auto;padding:0 8px;font-size:11px;background:#e8f4e8;border-color:#5a9e5a;color:#2d6a2d;">📄 All Drafts</button>
            </div>
            <div class="panel-body">
                <div class="letter-preview">
                    <div id="letterPreview"></div>
                </div>
            </div>
            <div class="resize-handle" onmousedown="startResize(event, 'previewPanel')"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <span id="toastMessage"></span>
    </div>

    <!-- Modal Dialog -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Modal</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        // Global data store
        const appData = {
            addresses: [],
            copyAddresses: [],
            templates: [],
            tables: {},
            tableCounter: 0
        };

        let currentManager = '';
        var isResizing = false;
        var currentPanel = null;
        var startY = 0;
        var startHeight = 0;

        function todayFormatted() {
            var d = new Date();

            var maxHeight = window.innerHeight - 100;

        var mergeState = { headers: [], rows: [], currentIndex: -1 };

        function mergeSubstitute(text) {
            if (mergeState.currentIndex < 0 || !mergeState.rows.length) return text;
            var row = mergeState.rows[mergeState.currentIndex];
            mergeState.headers.forEach(function(h) {
                var re = new RegExp('\\{' + h.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\}', 'gi');
                text = text.replace(re, row[h] || '');
            });
            return text;
        }

        function handleMergeUpload(event) {
            var file = event.target.files[0];
            if (!file) return;
            var ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'csv') {
                var reader = new FileReader();
                reader.onload = function(e) { parseMergeCSV(e.target.result); };
                reader.readAsText(file);
            } else {
                var reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                        var ws = wb.Sheets[wb.SheetNames[0]];
                        var raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                        if (raw.length < 2) { showToast('Table needs at least a header row and one data row.'); return; }
                        processMergeData(raw);
                    } catch(err) { showToast('Could not read file.'); }
                };
                reader.readAsArrayBuffer(file);
            }
            event.target.value = '';
        }

        function parseMergeCSV(text) {
            // Full character-by-character parser that preserves newlines inside quoted fields
            var raw = [], row = [], field = '', inQuote = false;
            for (var i = 0; i < text.length; i++) {
                var c = text[i], next = i + 1 < text.length ? text[i + 1] : '';
                if (inQuote) {
                    if (c === '"' && next === '"') { field += '"'; i++; }       // escaped quote
                    else if (c === '"') { inQuote = false; }                    // closing quote
                    else { field += c; }                                        // preserve \n inside quotes
                } else {
                    if (c === '"') { inQuote = true; }
                    else if (c === ',') { row.push(field); field = ''; }
                    else if (c === '\r' && next === '\n') {                     // CRLF
                        row.push(field); if (row.some(function(v){return v.trim();})) raw.push(row);
                        row = []; field = ''; i++;
                    } else if (c === '\n' || c === '\r') {                      // LF or CR
                        row.push(field); if (row.some(function(v){return v.trim();})) raw.push(row);
                        row = []; field = '';
                    } else { field += c; }
                }
            }
            // flush last field/row
            row.push(field);
            if (row.some(function(v){return v.trim();})) raw.push(row);
            if (raw.length < 2) { showToast('Table needs at least a header row and one data row.'); return; }
            processMergeData(raw);
        }

        function processMergeData(raw) {
            var headers = raw[0].map(function(h) { return String(h).trim(); }).filter(Boolean);
            var rows = [];
            for (var i = 1; i < raw.length; i++) {
                var anyVal = false;
                for (var j = 0; j < headers.length; j++) { if (String(raw[i][j] || '').trim()) { anyVal = true; break; } }
                if (!anyVal) continue;
                var rowObj = {};
                headers.forEach(function(h, idx) {
                    var _v = String(raw[i][idx] !== undefined ? raw[i][idx] : '').replace(/\\n/g, '\n');
                    if (_v.charAt(0) === '"' && _v.charAt(_v.length - 1) === '"' && _v.length >= 2) _v = _v.slice(1, -1);
                    rowObj[h] = _v;
                });
                rows.push(rowObj);
            }
            if (!rows.length) { showToast('No data rows found.'); return; }
            mergeState.headers = headers;
            mergeState.rows = rows;
            mergeState.currentIndex = -1;
            showMergePanel();
            showToast('Loaded ' + rows.length + ' row(s) with columns: ' + headers.join(', '));
        }

        function renderMergeTable() {
            var container = document.getElementById('mergeTableContainer');
            if (!container || !mergeState.headers.length) return;
            var html = '<table><thead>';
            html += '<tr class="merge-placeholder-row">';
            mergeState.headers.forEach(function(h) {
                html += '<td title="Copy this placeholder into your notice fields">' + escMerge('{' + h + '}') + '</td>';
            });
            html += '</tr>';
            html += '<tr class="merge-header-row">';
            mergeState.headers.forEach(function(h) { html += '<td>' + escMerge(h) + '</td>'; });
            html += '</tr></thead><tbody>';
            mergeState.rows.forEach(function(row, index) {
                var active = index === mergeState.currentIndex;
                html += '<tr class="merge-data-row' + (active ? ' active' : '') + '" onclick="applyMergeRow(' + index + ')">';
                mergeState.headers.forEach(function(h) {
                    var val = row[h] || '';
                    html += '<td>' + escMerge(val) + '</td>';
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            container.innerHTML = html;
            if (mergeState.currentIndex >= 0) {
                var activeRow = container.querySelector('tr.active');
                if (activeRow) activeRow.scrollIntoView({ block: 'nearest' });
            }
        }

        function escMerge(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

        /* ── Header rendering (settings managed from index.html) ── */
        function buildHeaderSection(textContent, mb, textAlign) {
            var mode = localStorage.getItem('headerMode_notice');
            if (mode === 'none') {
                return '<div style="text-align:' + textAlign + ';margin-bottom:' + mb + ';">' + textContent + '</div>';
            }
            if (mode === 'header') {
                var hdr = localStorage.getItem('officeHeader');
                if (hdr) {
                    return '<div style="margin-bottom:' + mb + ';line-height:0;">' +
                           '<img src="' + hdr + '" style="width:100%;display:block;">' +
                           '</div>';
                }
                return '<div style="text-align:' + textAlign + ';margin-bottom:' + mb + ';">' + textContent + '</div>';
            }
            if (mode === 'logo') {
                return buildHeaderWithLogo(textContent, mb, textAlign);
            }
            // no mode set: auto (check header image first, then logo)
            var hdr = localStorage.getItem('officeHeader');
            if (hdr) {
                return '<div style="margin-bottom:' + mb + ';line-height:0;">' +
                       '<img src="' + hdr + '" style="width:100%;display:block;">' +
                       '</div>';
            }
            return buildHeaderWithLogo(textContent, mb, textAlign);
        }
        function buildHeaderWithLogo(textContent, mb, textAlign) {
            var logo = localStorage.getItem('officeLogo');
            var pos = localStorage.getItem('officeLogoPos') || 'center';
            var size = localStorage.getItem('officeLogoSize') || '115';
            if (!logo) {
                return '<div style="text-align:' + textAlign + ';margin-bottom:' + mb + ';">' + textContent + '</div>';
            }
            var imgTag = '<img src="' + logo + '" style="height:' + size + 'px;max-width:400px;object-fit:contain;">';
            if (pos === 'center') {
                return '<div style="text-align:' + textAlign + ';margin-bottom:' + mb + ';">' +
                       '<div style="margin-bottom:8px;">' + imgTag + '</div>' +
                       textContent + '</div>';
            }
            var hrM = textContent.match(/<hr[^>]*>/i);
            var bodyContent = hrM ? textContent.replace(hrM[0], '') : textContent;
            var hrHtml = hrM ? hrM[0] : '';
            return '<table style="width:100%;border-collapse:collapse;margin-bottom:0;padding:0;">' +
                   '<tr>' +
                   '<td style="border:none;padding:0 15px 0 0;vertical-align:middle;width:1%;white-space:nowrap;">' + imgTag + '</td>' +
                   '<td style="border:none;padding:0;vertical-align:middle;text-align:' + textAlign + ';">' + bodyContent + '</td>' +
                   '</tr></table>' +
                   hrHtml +
                   '<div style="margin-bottom:' + mb + ';"></div>';
        }

        // Template management
        function handleTemplateImport(file) {
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const templateData = JSON.parse(e.target.result);

                    if (!templateData.name || !templateData.data) {
                        showToast('Invalid template file format', 'error');
                        return;
                    }

                    loadTemplateData(templateData);
                    showToast(`Template "${templateData.name}" imported successfully`);
                } catch (error) {
                    console.error('Template import error:', error);
                    showToast('Error reading template file', 'error');
                }
            };
            reader.readAsText(file);
        }

        function loadTemplateData(templateData) {
            const data = templateData.data;

            // Load basic fields
            const _tp = getOfficeProfile();
            document.getElementById('refNumber').value = data.refNumber || '';
            document.getElementById('noticeTitle').value = data.noticeTitle || '';
            const subjectEl = document.getElementById('subject');
            subjectEl.value = data.subject || '';
            autoExpand(subjectEl);
            document.getElementById('letterBody').value = data.letterBody || '';
            const _p = getOfficeProfile();
            document.getElementById('principalName').value = data.principalName || (_p && _p.principalName) || '';

            // Load tables
            appData.tables = data.tables || {};
            updateTablesDisplay();

            // Clear and rebuild dynamic fields
            clearDynamicFields();

            // Load references
            if (data.references && data.references.length > 0) {
                data.references.forEach((ref, index) => {
                    if (index > 0) addField('references', 'ref');
                    const _ri = document.querySelectorAll('.reference-input')[index];
                    _ri.value = ref; autoExpand(_ri);
                });
            }

            // Load to items
            if (data.to && data.to.length > 0) {
                data.to.forEach(item => {
                    addTo();
                    document.getElementById(`to-text-${toCount}`).value = item;
                });
            }

            // Load copy addresses
            if (data.copyTo && data.copyTo.length > 0) {
                data.copyTo.forEach((copy, index) => {
                    if (index > 0) addField('copyTo', 'copy');
                    document.querySelectorAll('.copy-input')[index].value = copy;
                });
            }

            updatePreview();
        }

        function downloadJSON(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Excel file handling
        function handleExcelUpload(files) {
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function (e) {
                    try {
                        const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                        const sheetName = workbook.SheetNames[0];
                        const sheet = workbook.Sheets[sheetName];

                        const tableNum = getNextTableNumber();
                        const tableId = `TABLE_${tableNum}`;

                        appData.tables[tableId] = {
                            html: processExcelToHTML(sheet),
                            fileName: file.name
                        };

                        updateTablesDisplay();
                        insertTablePlaceholder(tableId);
                        updatePreview();
                        showToast(`Excel file "${file.name}" uploaded as {{${tableId}}}`);
                    } catch (error) {
                        console.error('Excel processing error:', error);
                        showToast(`Error processing Excel file "${file.name}"`, 'error');
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function processExcelToHTML(worksheet) {
            const htmlTable = XLSX.utils.sheet_to_html(worksheet, {
                header: '',
                editable: false
            });

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlTable;
            const table = tempDiv.querySelector('table');

            if (!table) return htmlTable;

            // Clean and standardize the table
            table.style.cssText = 'width: 100%; border-collapse: collapse; margin: 20px 0; font-family: inherit; font-size: 11pt;';

            const rows = table.querySelectorAll('tr');
            rows.forEach((row, rowIndex) => {
                const cells = row.querySelectorAll('td, th');
                cells.forEach(cell => {
                    const isHeader = rowIndex === 0;
                    const baseStyle = 'border: 1px solid #000; padding: 2px; text-align: left; white-space: pre-wrap;';
                    const headerStyle = ''; // No special header style

                    cell.style.cssText = baseStyle + headerStyle;
                    cell.innerHTML = (cell.textContent || '').trim();
                });
            });

            return table.outerHTML;
        }

        function getNextTableNumber() {
            let num = 1;
            while (appData.tables[`TABLE_${num}`]) num++;
            return num;
        }

        function insertTable() {
            const tableNum = getNextTableNumber();
            const tableId = `TABLE_${tableNum}`;
            insertTablePlaceholder(tableId);
        }

        function insertTablePlaceholder(tableId) {
            const letterBody = document.getElementById('letterBody');
            const cursorPos = letterBody.selectionStart;
            const placeholder = `{{${tableId}}}`;

            const before = letterBody.value.substring(0, cursorPos);
            const after = letterBody.value.substring(cursorPos);
            letterBody.value = before + placeholder + after;

            letterBody.focus();
            letterBody.setSelectionRange(cursorPos + placeholder.length, cursorPos + placeholder.length);
            updatePreview();
        }

        function updateTablesDisplay() {
            const container = document.getElementById('uploadedTables');
            const tableKeys = Object.keys(appData.tables);

            if (tableKeys.length === 0) {
                container.innerHTML = '';
                return;
            }

            let html = '<div class="uploaded-files">';
            tableKeys.forEach(tableId => {
                const table = appData.tables[tableId];
                html += `
                    <div class="file-item">
                        <span>{{${tableId}}} - ${table.fileName}</span>
                        <button onclick="removeTable('${tableId}')" class="btn btn-danger btn-small">Remove</button>
                    </div>
                `;
            });
            html += '</div>';

            container.innerHTML = html;
        }

        function removeTable(tableId) {
            if (!confirm(`Remove table {{${tableId}}}?`)) return;

            delete appData.tables[tableId];

            // Remove placeholder from letter body
            const letterBody = document.getElementById('letterBody');
            letterBody.value = letterBody.value.replace(new RegExp(`\\{\\{${tableId}\\}\\}`, 'g'), '');

            updateTablesDisplay();
            updatePreview();
            showToast(`Table {{${tableId}}} removed`);
        }

        // Dynamic field management
        function addField(containerId, type) {
            const container = document.getElementById(containerId);
            let template = '';

            switch (type) {
                case 'to':
                    template = `
                        <div class="dynamic-item">
                            <div class="dynamic-item-content">
                                <select class="address-dropdown" onchange="loadAddress(this, 'to')">
                                    <option value="">Select saved address...</option>
                                </select>
                                <textarea class="address-textarea" onchange="updatePreview()" placeholder="Enter recipient address"></textarea>
                            </div>
                            <button type="button" class="btn btn-danger btn-small" onclick="removeField(this, '${containerId}')">×</button>
                        </div>
                    `;
                    break;
                case 'copy':
                    template = `
                        <div class="dynamic-item">
                            <div class="dynamic-item-content">
                                <select class="copy-dropdown" onchange="loadAddress(this, 'copy')">
                                    <option value="">Select saved copy address...</option>
                                </select>
                                <input type="text" class="copy-input" oninput="updatePreview()" placeholder="Enter copy recipient">
                            </div>
                            <button type="button" class="btn btn-danger btn-small" onclick="removeField(this, '${containerId}')">×</button>
                        </div>
                    `;
                    break;
                case 'ref':
                    template = `
                        <div class="dynamic-item">
                            <textarea class="reference-input" rows="1" style="resize:none;overflow:hidden;min-height:36px;" oninput="autoExpand(this);updatePreview()" placeholder="Enter reference"></textarea>
                            <button type="button" class="btn btn-danger btn-small" onclick="removeField(this, '${containerId}')">×</button>
                        </div>
                    `;
                    break;
            }

            container.insertAdjacentHTML('beforeend', template);
            updateDropdowns();
            updatePreview();
        }

        function removeField(button, containerId) {
            const container = document.getElementById(containerId);
            if (container.children.length > 1) {
                button.closest('.dynamic-item').remove();
                updatePreview();
            } else {
                showToast('At least one field is required', 'error');
            }
        }

        function addTo() {
            toCount++;
            const container = document.getElementById('toContainer');
            const div = document.createElement('div');
            div.className = 'dynamic-item';
            div.id = `to-${toCount}`;
            div.innerHTML = `
                <div class="dynamic-item-content">
                    <input type="text" id="to-text-${toCount}" class="to-input" placeholder="Enter recipient..." oninput="updatePreview()">
                </div>
                <button type="button" class="btn btn-danger" onclick="removeTo(${toCount})">×</button>
            `;
            container.appendChild(div);
        }

        function removeTo(id) {
            const div = document.getElementById(`to-${id}`);
            if (div) { div.remove(); updatePreview(); }
        }

        function collectToItems() {
            return Array.from(document.querySelectorAll('.to-input'))
                .map(input => input.value.trim())
                .filter(v => v);
        }

        function clearDynamicFields() {
            const containers = ['references', 'copyTo'];
            containers.forEach(containerId => {
                const container = document.getElementById(containerId);
                while (container.children.length > 1) {
                    container.removeChild(container.lastChild);
                }
            });
            document.getElementById('toContainer').innerHTML = '';
            toCount = 0;
        }

        function clearForm() {
            if (!confirm('Clear all form data? This action cannot be undone.')) return;

            const _cp = getOfficeProfile();
            document.getElementById('refNumber').value = '';
            document.getElementById('noticeTitle').value = '';
            const subjectElClear = document.getElementById('subject');
            subjectElClear.value = '';
            autoExpand(subjectElClear);
            document.getElementById('letterBody').value = '';
            document.getElementById('principalName').value = _cp && _cp.principalName ? _cp.principalName : '';

            // Clear dynamic fields
            clearDynamicFields();
            document.querySelector('.reference-input').value = '';
            document.querySelector('.copy-input').value = '';

            // Clear tables
            appData.tables = {};
            updateTablesDisplay();

            document.getElementById('templateSelect').value = 'custom';
            updatePreview();
            showToast('Form cleared');
        }

        // Address management (only copy addresses needed)
        function updateDropdowns() {
            const copyDropdowns = document.querySelectorAll('.copy-dropdown');
            const templateSelect = document.getElementById('templateSelect');

            // Update copy dropdowns
            copyDropdowns.forEach(dropdown => {
                const currentValue = dropdown.value;
                dropdown.innerHTML = '<option value="">Select saved copy address...</option>';
                appData.copyAddresses.forEach((addr, index) => {
                    dropdown.innerHTML += `<option value="${index}">${addr.title}</option>`;
                });
                dropdown.value = currentValue;
            });

            // Update template dropdown
            templateSelect.innerHTML = '<option value="custom">Custom Template</option>';
            appData.templates.forEach((template, index) => {
                templateSelect.innerHTML += `<option value="${index}">${template.name}</option>`;
            });
        }

        function loadAddress(dropdown, type) {
            if (dropdown.value === '') return;

            const address = appData.copyAddresses[dropdown.value];

            if (address) {
                const target = dropdown.closest('.dynamic-item-content').querySelector('.copy-input');
                target.value = address.address;
                updatePreview();
            }
        }

        function loadTemplate() {
            const select = document.getElementById('templateSelect');
            if (select.value === 'custom') return;

            const template = appData.templates[select.value];
            if (template) {
                loadTemplateData(template);
                showToast(`Template "${template.name}" loaded`);
            }
        }

        // Address manager
        function openManager(type) {
            currentManager = type;
            const title = type === 'address' ? 'Manage Addresses' : 'Manage Copy Addresses';
            const items = type === 'address' ? appData.addresses : appData.copyAddresses;

            let html = '<div style="margin-bottom: 20px;">';

            items.forEach((item, index) => {
                html += `
                    <div style="border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 10px; background: #f9f9f9;">
                        <h4 style="margin-bottom: 10px; color: var(--primary);">${item.title}</h4>
                        <textarea readonly style="width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: white;">${item.address}</textarea>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn btn-primary btn-small" onclick="editItem(${index})">Edit</button>
                            <button class="btn btn-danger btn-small" onclick="deleteItem(${index})">Delete</button>
                        </div>
                    </div>
                `;
            });

            html += `
                </div>
                <button class="btn btn-success" onclick="addNewItem()">+ Add New ${type === 'address' ? 'Address' : 'Copy Address'}</button>
            `;

            showModal(title, html);
        }

        function editItem(index) {
            const items = currentManager === 'address' ? appData.addresses : appData.copyAddresses;
            const item = items[index];

            const title = prompt('Title:', item.title);
            if (title === null) return;

            const address = prompt('Address:', item.address);
            if (address === null) return;

            items[index] = { title: title.trim(), address: address.trim() };
            saveData();
            updateDropdowns();
            openManager(currentManager);
            showToast('Item updated');
        }

        function deleteItem(index) {
            if (!confirm('Delete this item?')) return;

            const items = currentManager === 'address' ? appData.addresses : appData.copyAddresses;
            items.splice(index, 1);
            saveData();
            updateDropdowns();
            openManager(currentManager);
            showToast('Item deleted');
        }

        function addNewItem() {
            const title = prompt('Title:');
            if (!title) return;

            const address = prompt('Address:');
            if (!address) return;

            const items = currentManager === 'address' ? appData.addresses : appData.copyAddresses;
            items.push({ title: title.trim(), address: address.trim() });
            saveData();
            updateDropdowns();
            openManager(currentManager);
            showToast('Item added');
        }

        function autoExpand(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        // Letter preview and copying
        function applyMergeToData(data) {
            data.refNumber    = mergeSubstitute(data.refNumber    || '');
            data.noticeTitle  = mergeSubstitute(data.noticeTitle  || '');
            data.subject      = mergeSubstitute(data.subject      || '');
            data.letterBody   = mergeSubstitute(data.letterBody   || '');
            data.principalName= mergeSubstitute(data.principalName|| '');
            data.references   = (data.references   || []).map(function(r) { return mergeSubstitute(r); });
            data.to           = (data.to           || []).map(function(t) { return mergeSubstitute(t); });
            data.copyTo       = (data.copyTo       || []).map(function(c) { return mergeSubstitute(c); });
            return data;
        }

        function updatePreview() {
            document.querySelector('.letter-preview').style.fontFamily = labels[currentLang].font;
            const data = applyMergeToData(gatherFormData());
            const preview = document.getElementById('letterPreview');

            // Process letter body with table replacements
            let processedBody = data.letterBody;
            Object.keys(appData.tables).forEach(tableId => {
                processedBody = processedBody.replace(`{{${tableId}}}`, appData.tables[tableId].html);
            });

            const letterHTML = generateLetterHTML(data, processedBody);
            preview.innerHTML = letterHTML;
            applyZoom();
        }

        function generateLetterHTML(data, processedBody) {
            const L = labels[currentLang];
            // Only show subject and references sections if they have content
            const hasSubject = data.subject && data.subject.trim();
            const hasReferences = data.references && data.references.length > 0 && data.references.some(ref => ref.trim());

            const subjectReferencesHTML = (hasSubject || hasReferences) ? `
                <div style="margin-bottom: 20px; font-size: 12pt;">
                    <table style="width: 100%; border-collapse: collapse; margin-left: 7ch;">
                        ${hasSubject ? `
                            <tr>
                                <td style="border: none; padding: 0; vertical-align: top; width: 80px;">${L.subject}:</td>
                                <td style="border: none; padding: 0; vertical-align: top; line-height: 1.6;">${data.subject}</td>
                            </tr>
                        ` : ''}
                        ${hasReferences ? `
                            <tr>
                                <td style="border: none; padding: 0; vertical-align: top; width: 80px; padding-top: ${hasSubject ? '10px' : '0'};">${L.reference}:</td>
                                <td style="border: none; padding: 0; vertical-align: top; line-height: 1.6; padding-top: ${hasSubject ? '10px' : '0'};">
                                    ${data.references.length > 1
                        ? `<table style="width: 100%; border-collapse: collapse; margin: 0; padding: 0;">
                                    ${data.references.filter(ref => ref.trim()).map((ref, i) => `
                                        <tr>
                                            <td style="border: none; padding: 0; vertical-align: top; width: 30px;">${i + 1})</td>
                                            <td style="border: none; padding: 0; vertical-align: top; text-align: justify;">${ref}</td>
                                        </tr>
                                    `).join('')}
                                   </table>`
                        : data.references.find(ref => ref.trim()) || ''
                    }
                                </td>
                            </tr>
                        ` : ''}
                    </table>
                </div>
            ` : '';

            const toHTML = data.to && data.to.length > 0 ? `
                <div style="font-size: 12pt; margin-bottom: 4px;">
                    <div>${L.to}:</div>
                    ${data.to.length > 1 ? `
                        <table style="width: 100%; border-collapse: collapse; margin-left: 7ch;">
                            ${data.to.map((item, index) => `
                                <tr>
                                    <td style="border: none; padding: 0; vertical-align: top; width: 30px; line-height: 1.6;">${index + 1}.</td>
                                    <td style="border: none; padding: 0; vertical-align: top; line-height: 1.6;">${item}</td>
                                </tr>
                            `).join('')}
                        </table>
                    ` : `<div style="margin-left: 7ch; line-height: 1.6;">${data.to[0]}</div>`}
                </div>
            ` : '';

            const copyToHTML = data.copyTo && data.copyTo.length > 0 ? `
                <div style="font-size: 12pt;">
                    <div>${L.copy}:</div>
                    ${data.copyTo.length > 1 ? `
                        <table style="width: 100%; border-collapse: collapse; margin-left: 7ch;">
                            ${data.copyTo.map((copy, index) => `
                                <tr>
                                    <td style="border: none; padding: 0; vertical-align: top; width: 30px; line-height: 1.6;">${index + 1}.</td>
                                    <td style="border: none; padding: 0; vertical-align: top; line-height: 1.6;">${copy}</td>
                                </tr>
                            `).join('')}
                        </table>
                    ` : `<div style="margin-left: 7ch; line-height: 1.6;">${data.copyTo[0]}</div>`}
                </div>
            ` : '';

            const bodyParagraphs = processedBody
                .split('\n')
                .filter(p => p.trim())
                .map(p => `<p style="margin-bottom: 15px; text-indent: 1.5cm; text-align: justify;">${p}</p>`)
                .join('');

            const _prof = getOfficeProfile();
            const _officeName = (_prof && (currentLang === 'en' ? (_prof.officeNameEn || _prof.officeName) : _prof.officeName)) || '[ Office Name ]';
            const _rawAddr = _prof && (currentLang === 'en' ? (_prof.officeAddressEn || _prof.officeAddress) : _prof.officeAddress);
            const _officeAddr = _rawAddr
                ? _rawAddr.split('\n').map(l => `<div>${l}</div>`).join('')
                : '<div>[ Office Address ]</div>';
            const _hdrNotice = `<div style="font-size: 18pt; font-weight: bold; color: #1a472a; margin-bottom: 8px;">${_officeName}</div><div style="font-size: 12pt; line-height: 1.6; color: #2c3e50;">${_officeAddr}</div><hr style="border: none; border-top: 2px solid #2c3e50; margin: 20px 0;">`;
            return `
                <div class="page-container">
                    ${buildHeaderSection(_hdrNotice, '30px', 'center')}

                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 12pt;">
                        <div>${L.number}: ${data.refNumber}</div>

                        <div>${data.principalName}</div>

                    ${toHTML}
                    ${copyToHTML}
                </div>

        function copyLetter() {
            const data = applyMergeToData(gatherFormData());
            if (!data.refNumber || !data.refNumber.trim()) {
                alert('Reference Number is blank. Please enter a reference number before copying.');
                return;
            }
            let processedBody = data.letterBody;

            // Replace table placeholders
            Object.keys(appData.tables).forEach(tableId => {
                processedBody = processedBody.replace(`{{${tableId}}}`, appData.tables[tableId].html);
            });

            const letterContent = createCopyableContent(data, processedBody);

            if (navigator.clipboard && window.ClipboardItem) {
                const htmlContent = `<html><body style="font-family: ${labels[currentLang].font}; font-size: 12pt; line-height: 1.3; color: #000; margin: 0; padding: 0;">${letterContent}</body></html>`;
                const textContent = createPlainTextContent(data, processedBody);

                const clipboardItem = new ClipboardItem({
                    'text/html': new Blob([htmlContent], { type: 'text/html' }),
                    'text/plain': new Blob([textContent], { type: 'text/plain' })
                });

                navigator.clipboard.write([clipboardItem]).then(() => {
                    showToast('Copied! Reference No: ' + data.refNumber);
                }).catch(() => {
                    fallbackCopy(letterContent);
                });
            } else {
                fallbackCopy(letterContent);
            }
        }

                    <div style="margin: 0 0 5px 0; padding: 0; text-align: justify; font-size: 13pt; line-height: 1.4;">
                        ${bodyContent}
                    </div>
                    
                    <div style="margin: 0 0 5px 0; padding: 0;"></div>
                    
                    <div style="text-align: right; margin: 0 0 15px 0; padding: 0; font-size: 13pt; line-height: 1.3;">
                        <div style="margin: 0; padding: 0;">${data.principalName}</div>
                        <div style="margin: 0; padding: 0;">${L.principal}</div>
                    </div>

                    ${toSection}
                    ${copyToSection}
                </div>
            `;
        }

        function createPlainTextContent(data, processedBody) {
            const L = labels[currentLang];
            const hasSubject = data.subject && data.subject.trim();
            const hasReferences = data.references && data.references.length > 0 && data.references.some(ref => ref.trim());

            const references = hasReferences ?
                L.reference + ': ' + (data.references.length > 1
                    ? data.references.filter(ref => ref.trim()).map((ref, i) => `${i + 1}) ${ref}`).join('\n       ')
                    : (data.references.find(ref => ref.trim()) || '')) + '\n' : '';

            const toText = data.to && data.to.length > 0 ?
                L.to + ':\n' + data.to
                    .map((item, index) => `  ${data.to.length > 1 ? `${index + 1}. ` : ''}${item}`)
                    .join('\n') : '';

            const copyTo = data.copyTo && data.copyTo.length > 0 ?
                L.copy + ':\n' + data.copyTo
                    .map((copy, index) => `  ${data.copyTo.length > 1 ? `${index + 1}. ` : ''}${copy}`)
                    .join('\n') : '';

            const bodyText = processedBody ?
                processedBody.split('\n')
                    .filter(p => p.trim())
                    .map(p => `  ${p}`)
                    .join('\n') : '';

            const _cp2 = getOfficeProfile();
            const _cn2 = (_cp2 && (currentLang === 'en' ? (_cp2.officeNameEn || _cp2.officeName) : _cp2.officeName)) || '[ Office Name ]';
            const _ca2 = (_cp2 && (currentLang === 'en' ? (_cp2.officeAddressEn || _cp2.officeAddress) : _cp2.officeAddress)) || '[ Office Address ]';
            return `${_cn2}
${_ca2}
____________________________________________________________________________

${L.number}: ${data.refNumber}                                            ${L.date}: #ApprovedDate#

${data.noticeTitle ? `                                    ${data.noticeTitle}\n\n` : ''}${hasSubject ? `  ${L.subject}: ${data.subject}\n` : ''}${references}
${bodyText}

                                                        ${data.principalName}
                                                        ${L.principal}

${toText}${toText ? '\n' : ''}${copyTo}`;
        }

        function fallbackCopy(content) {
            const tempDiv = document.createElement('div');
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            tempDiv.style.width = '800px';
            tempDiv.innerHTML = content;
            document.body.appendChild(tempDiv);

            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(tempDiv);
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                showToast('Letter copied! Paste into your document.');
            } catch (err) {
                showToast('Copy failed. Please try again.', 'error');
            }

            selection.removeAllRanges();
            document.body.removeChild(tempDiv);
        }

        // Modal functions
        function showModal(title, content) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = content;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Toast notification
        function showToast(message, type) {
            type = type || 'success';
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');

            toast.className = 'toast ' + type;
            toastMessage.textContent = message;
            toast.classList.add('show');

            setTimeout(function () {
                toast.classList.remove('show');
            }, 3000);
        }

        // Event listeners
        window.onclick = function (event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        };

        // Keyboard shortcuts
        document.addEventListener('keydown', function (event) {
            if (event.ctrlKey || event.metaKey) {
                switch (event.key) {
                    case 's':
                        event.preventDefault();
                        exportTemplate();
                        break;
                    case 'Enter':
                        if (event.shiftKey) {
                            event.preventDefault();
                            copyLetter();
                        }
                        break;
                }
            }
        });

        // Auto-save functionality
        let autoSaveTimeout;
        function autoSave() {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(() => {
                const formData = gatherFormData();
                sessionStorage.setItem('ml_current_letter', JSON.stringify(formData));
            }, 2000);
        }

        function loadAutoSave() {
            try {
                const savedData = JSON.parse(sessionStorage.getItem('ml_current_letter'));
                if (savedData) {
                    loadTemplateData({ data: savedData });
                }
            } catch (error) {
                console.error('Error loading auto-saved data:', error);
            }
        }

        // Add auto-save to input events
        function setupAutoSave() {
            const inputs = document.querySelectorAll('input, textarea, select');
            inputs.forEach(input => {
                input.addEventListener('input', autoSave);
            });
        }

        // Make functions globally accessible
        window.initializeApp = initializeApp;
        window.loadTemplate = loadTemplate;
        window.exportTemplate = exportTemplate;
        window.clearForm = clearForm;
        window.insertTable = insertTable;
        window.removeTable = removeTable;
        window.addField = addField;
        window.removeField = removeField;
        window.loadAddress = loadAddress;
        window.openManager = openManager;
        window.editItem = editItem;
        window.deleteItem = deleteItem;
        window.addNewItem = addNewItem;
        window.updatePreview = updatePreview;
        window.copyLetter = copyLetter;
        window.showModal = showModal;
        window.closeModal = closeModal;
        window.showToast = showToast;

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', function () {
            initializeApp();
            setupAutoSave();
            loadAutoSave();
        });

        // Initialize immediately if DOM already loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>

</html>
